{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">数据可视化</h4>
    </div>
    <div class="card-body">
        <!-- 错误提示区域 -->
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        
        <form method="POST" class="mb-4">
            <div class="row align-items-end">
                <div class="col-md-3">
                    <label class="form-label">图表类型</label>
                    <select name="chart_type" id="chart_type" class="form-select" required>
                        <option value="scatter">散点图</option>
                        <option value="line">折线图</option>
                        <option value="bar">柱状图</option>
                        <option value="histogram">直方图</option>
                        <option value="box">箱线图</option>
                        <option value="pie">饼图</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">X轴/类别列</label>
                    <select name="x_column" id="x_column" class="form-select" required>
                        <option value="">请选择</option>
                        {% for col in numeric_columns %}
                        <option value="{{ col }}">{{ col }} (数值)</option>
                        {% endfor %}
                        {% for col in categorical_columns %}
                        <option value="{{ col }}">{{ col }} (类别)</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3" id="y_column_div">
                    <label class="form-label">Y轴/数值列</label>
                    <select name="y_column" id="y_column" class="form-select">
                        <option value="">请选择</option>
                        {% for col in numeric_columns %}
                        <option value="{{ col }}">{{ col }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">颜色分组 (可选)</label>
                    <select name="color_column" class="form-select">
                        <option value="">无</option>
                        {% for col in categorical_columns %}
                        <option value="{{ col }}">{{ col }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-primary w-100">生成</button>
                </div>
            </div>
        </form>
        
        {% if plot_html %}
        <div class="mt-4">
            {{ plot_html|safe }}
        </div>
        {% endif %}
        
        <div class="mt-3">
            <a href="{{ url_for('analysis') }}" class="btn btn-primary">进入数据分析</a>
        </div>
    </div>
</div>

<script>
document.getElementById('chart_type').addEventListener('change', function() {
    const chartType = this.value;
    const yColumnDiv = document.getElementById('y_column_div');
    const yColumnSelect = document.getElementById('y_column');
    
    if (chartType === 'histogram' || chartType === 'pie') {
        yColumnDiv.style.display = 'none';
        yColumnSelect.removeAttribute('required');
    } else {
        yColumnDiv.style.display = 'block';
        yColumnSelect.setAttribute('required', 'required');
    }
});
</script>
{% endblock %}
