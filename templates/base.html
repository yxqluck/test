<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式数据分析系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Plotly JS -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">交互式数据分析系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">文件上传</a>
                    </li>
                    {% if 'data' in session %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('data_preview') }}">数据预览</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('data_clean') }}">数据清洗</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('visualization') }}">数据可视化</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('analysis') }}">数据分析</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('export_data') }}">导出数据</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('reset') }}" onclick="return confirm('确定要重置吗？所有数据将被清除。')">重置</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if 'filename' in session %}
        <div class="alert alert-info">
            当前文件: {{ session.filename }}
        </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
